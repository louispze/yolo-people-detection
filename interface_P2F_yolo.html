<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Smart Home</title>
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --inner-bg: #252525;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --accent-green: #1D9E75;
            --border-color: #333333;
            --border-radius-lg: 16px;
            --border-radius-md: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .dash { width: 100%; max-width: 800px; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .header h1 { font-size: 24px; font-weight: 600; }
        .status-pill { font-size: 11px; color: #4ade80; background: rgba(74, 222, 128, 0.1); padding: 6px 12px; border-radius: 20px; border: 1px solid rgba(74, 222, 128, 0.2); transition: all 0.3s; }
        .status-pill.disconnected { color: #f87171; background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.2); }
        .status-pill.connecting   { color: #facc15; background: rgba(250,204,21,0.1);  border-color: rgba(250,204,21,0.2);  }

        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 2.5rem; }
        .stat { text-align: center; }
        .stat-val { font-size: 32px; font-weight: 600; margin-bottom: 4px; }
        .stat-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; }

        .section-label { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 15px; }

        .rooms { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-bottom: 2rem; }
        .room-card { background: var(--card-bg); border-radius: var(--border-radius-lg); padding: 20px; border: 1px solid var(--border-color); transition: border-color 0.3s; }
        .room-card.occupied { border-color: rgba(29,158,117,0.5); }
        .room-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .room-name { font-size: 16px; font-weight: 600; }
        .room-temp-display { font-size: 32px; font-weight: 600; margin-bottom: 15px; color: var(--accent-green); }
        
        .room-people { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-dim); margin-bottom: 20px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; transition: all 0.3s; }
        .dot.on  { background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
        .dot.off { background: #444; }

        /* Badge YOLO en temps réel */
        .yolo-badge { margin-left: auto; font-size: 10px; padding: 2px 8px; border-radius: 8px; font-weight: 600; }
        .yolo-badge.live { background: rgba(29,158,117,0.2); color: var(--accent-green); border: 1px solid rgba(29,158,117,0.3); }
        .yolo-badge.static { background: rgba(100,100,100,0.2); color: #666; border: 1px solid #333; }

        .thermostat-ctrl { display: flex; align-items: center; justify-content: space-between; background: var(--inner-bg); border-radius: var(--border-radius-md); padding: 10px; }
        .thermo-btn { width: 35px; height: 35px; border-radius: 8px; border: 1px solid var(--border-color); background: #333; color: white; cursor: pointer; font-size: 18px; }
        .thermo-label { font-size: 10px; color: var(--text-dim); }
        .thermo-val { font-size: 16px; font-weight: 600; }

        .lights-section { background: var(--card-bg); border-radius: var(--border-radius-lg); padding: 20px; border: 1px solid var(--border-color); margin-bottom: 2rem; }
        .lights-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        .light-item { background: var(--inner-bg); border-radius: var(--border-radius-md); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; }
        .light-name { font-size: 14px; font-weight: 500; }
        .light-sub { font-size: 12px; color: var(--text-dim); }
        .light-sub.on { color: #BA7517; }

        .toggle { width: 45px; height: 24px; border-radius: 15px; border: none; cursor: pointer; position: relative; transition: 0.3s; }
        .toggle.on  { background: #ffffff; }
        .toggle.off { background: #444; }
        .toggle::after { content: ''; position: absolute; width: 18px; height: 18px; border-radius: 50%; top: 3px; transition: 0.2s; }
        .toggle.on::after  { left: 24px; background: #000; }
        .toggle.off::after { left: 3px;  background: #888; }

        .yolo-bar { background: var(--card-bg); border-radius: var(--border-radius-lg); padding: 20px; border: 1px solid var(--border-color); }
        .yolo-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .last-update { font-size: 11px; color: var(--text-dim); }
        .yolo-rooms { display: flex; gap: 10px; flex-wrap: wrap; }
        .yolo-chip { background: var(--inner-bg); padding: 8px 15px; border-radius: 10px; font-size: 13px; display: flex; align-items: center; gap: 8px; border: 1px solid #333; transition: border-color 0.3s; }
        .yolo-chip.occupied { border-color: rgba(29,158,117,0.5); }
    </style>
</head>
<body>

<div class="dash">
  <div class="header">
    <h1>Mon domicile</h1>
    <span class="status-pill connecting" id="status-pill">⟳ Connexion…</span>
  </div>

  <div class="stats-row">
    <div class="stat">
      <div class="stat-val" id="total-people">—</div>
      <div class="stat-label">Personnes</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="avg-temp">21.0°</div>
      <div class="stat-label">Temp. moyenne</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="lights-count">4</div>
      <div class="stat-label">Lumières</div>
    </div>
  </div>

  <div class="section-label">Pièces</div>
  <div class="rooms" id="rooms-grid"></div>

  <div class="section-label">Lumières</div>
  <div class="lights-section">
    <div class="lights-grid" id="lights-grid"></div>
  </div>

  <div class="section-label">Détection YOLO</div>
  <div class="yolo-bar">
    <div class="yolo-header">
      <span style="font-size:13px;font-weight:600;">Comptage en temps réel</span>
      <span class="last-update" id="last-update">En attente…</span>
    </div>
    <div class="yolo-rooms" id="yolo-rooms"></div>
  </div>
</div>

<script>
// ------------------------------------------------------------------
// Données statiques (température, lumières)
// ------------------------------------------------------------------
const rooms = [
  { id: 'salon',    name: 'Salon',         icon: '🛋', temp: 22.8, baseTarget: 22.0, target: 22.0, people: 0 },
  { id: 'chambre1', name: 'Chambre 1',     icon: '🛏', temp: 19.4, baseTarget: 20.0, target: 20.0, people: 0 },
  { id: 'chambre2', name: 'Chambre 2',     icon: '🛏', temp: 18.9, baseTarget: 19.0, target: 19.0, people: 0 },
  { id: 'cuisine',  name: 'Cuisine',       icon: '🍳', temp: 21.3, baseTarget: 21.0, target: 21.0, people: 0 },
  { id: 'bureau',   name: 'Bureau',        icon: '💻', temp: 20.1, baseTarget: 20.0, target: 20.0, people: 0 },
  { id: 'sdb',      name: 'Salle de bain', icon: '🚿', temp: 23.5, baseTarget: 23.0, target: 23.0, people: 0 },
];

// -1°C toutes les 3 personnes (ex: 3 pers → -1°, 6 pers → -2°)
function computeTarget(room) {
  return room.baseTarget - Math.floor(room.people / 3);
}

const lights = [
  { name: 'Lampe salon',    on: true,  sub: '70%' },
  { name: 'Spots salon',    on: true,  sub: '49%' },
  { name: 'Chambre 1',      on: true,  sub: 'Allumée' },
  { name: 'Chambre 2',      on: false, sub: 'Éteinte' },
  { name: 'Cuisine',        on: true,  sub: 'Allumée' },
  { name: 'Bureau',         on: false, sub: 'Éteinte' },
  { name: 'Salle de bain',  on: false, sub: 'Éteinte' },
  { name: 'Entrée',         on: false, sub: 'Éteinte' },
];

// ------------------------------------------------------------------
// WebSocket – connexion au serveur YOLO
// ------------------------------------------------------------------
let wsConnected = false;
const WS_URL = 'ws://localhost:8765';

function connectWS() {
  const pill = document.getElementById('status-pill');
  pill.className = 'status-pill connecting';
  pill.textContent = '⟳ Connexion…';

  let ws;
  try { ws = new WebSocket(WS_URL); } catch(e) { scheduleReconnect(); return; }

  ws.onopen = () => {
    wsConnected = true;
    pill.className = 'status-pill';
    pill.textContent = '● Système actif (YOLO live)';
  };

  ws.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      if (msg.type === 'people_update') {
        updatePeople(msg.data);
      }
    } catch(e) { console.error('WS parse error', e); }
  };

  ws.onclose = () => {
    wsConnected = false;
    pill.className = 'status-pill disconnected';
    pill.textContent = '✕ YOLO déconnecté';
    scheduleReconnect();
  };

  ws.onerror = () => { ws.close(); };
}

function scheduleReconnect() {
  setTimeout(connectWS, 3000);
}

// ------------------------------------------------------------------
// Mise à jour des données YOLO
// ------------------------------------------------------------------
function updatePeople(data) {
  // data = { salon: 2, chambre1: 1, ... }
  for (const room of rooms) {
    if (data[room.id] !== undefined) {
      room.people = data[room.id];
      // Recalcule la consigne automatiquement
      room.target = computeTarget(room);
    }
  }
  render();

  const now = new Date();
  document.getElementById('last-update').textContent =
    'Mis à jour à ' + now.toLocaleTimeString('fr-FR');
}

// ------------------------------------------------------------------
// Rendu
// ------------------------------------------------------------------
function render() {
  // Pièces
  document.getElementById('rooms-grid').innerHTML = rooms.map(r => `
    <div class="room-card ${r.people > 0 ? 'occupied' : ''}">
      <div class="room-top">
        <span class="room-name">${r.name}</span>
        <span>${r.icon}</span>
      </div>
      <div class="room-temp-display">${r.temp.toFixed(1)}°C</div>
      <div class="room-people">
        <div class="dot ${r.people > 0 ? 'on' : 'off'}"></div>
        ${r.people === 0 ? 'Vide' : r.people + ' personne' + (r.people > 1 ? 's' : '')}
        <span class="yolo-badge ${wsConnected ? 'live' : 'static'}">${wsConnected ? 'LIVE' : 'STATIQUE'}</span>
      </div>
      <div class="thermostat-ctrl">
        <button class="thermo-btn" onclick="changeTarget('${r.id}', -0.5)">−</button>
        <div style="text-align:center;">
          <div class="thermo-label">Consigne${r.people >= 3 ? ' 🤖' : ''}</div>
          <div class="thermo-val">${r.target.toFixed(1)}°C</div>
          ${r.people >= 3 ? `<div style="font-size:9px;color:#888;">base ${r.baseTarget.toFixed(1)}° −${Math.floor(r.people/3)}°</div>` : ''}
        </div>
        <button class="thermo-btn" onclick="changeTarget('${r.id}', 0.5)">+</button>
      </div>
    </div>
  `).join('');

  // Lumières
  document.getElementById('lights-grid').innerHTML = lights.map((l,i) => `
    <div class="light-item">
      <div>
        <div class="light-name">${l.name}</div>
        <div class="light-sub ${l.on ? 'on' : ''}">${l.sub}</div>
      </div>
      <button class="toggle ${l.on ? 'on' : 'off'}" onclick="toggleLight(${i})"></button>
    </div>
  `).join('');

  // YOLO chips
  document.getElementById('yolo-rooms').innerHTML = rooms.map(r => `
    <div class="yolo-chip ${r.people > 0 ? 'occupied' : ''}">
      👤 ${r.name} <b>${r.people}</b>
    </div>
  `).join('');

  // Stats
  const temps = rooms.map(r => r.temp);
  document.getElementById('avg-temp').textContent =
    (temps.reduce((a,b)=>a+b,0)/temps.length).toFixed(1)+'°';
  document.getElementById('total-people').textContent =
    rooms.reduce((s,r)=>s+r.people, 0);
  document.getElementById('lights-count').textContent =
    lights.filter(l=>l.on).length;
}

window.changeTarget = (id, delta) => {
  const r = rooms.find(r => r.id === id);
  if (r) {
    r.baseTarget += delta;           // ajuste la base manuelle
    r.target = computeTarget(r);     // recalcule avec la nouvelle base
  }
  render();
};

window.toggleLight = (i) => {
  lights[i].on = !lights[i].on;
  lights[i].sub = lights[i].on ? 'Allumée' : 'Éteinte';
  render();
};

// ------------------------------------------------------------------
// Init
// ------------------------------------------------------------------
render();
connectWS();
</script>
</body>
</html>
